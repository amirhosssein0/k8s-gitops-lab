replicaCount: 1

image:
  repository: asdfghjkl0/k8s-gitops-lab
  tag: "1.0.0"

imagePullSecrets:
  - name: dockerhub

configMap:
  appEnv: develop

service:
  port: 8080
  type: ClusterIP

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: app-chart.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: app-chart-tls
      hosts:
        - app-chart.local

