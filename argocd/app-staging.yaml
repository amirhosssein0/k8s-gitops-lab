apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-staging
  namespace: argocd
spec:
  project: default 
  source:
    repoURL: https://github.com/amirhosssein0/k8s-gitops-lab
    targetRevision: master
    path: helm/app-chart
    helm:
      valueFiles:
        - ../../gitops/staging/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true